<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minna Journey — มินนา เส้นทางของใจ</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:        #FFF8F0;
      --cream-mid:    #F5EDE0;
      --cream-dark:   #EDD9C0;
      --tan:          #D4A87A;
      --brown-light:  #C4895A;
      --brown:        #8B5E3C;
      --text-dark:    #3A2414;
      --text-mid:     #6B4830;
      --text-soft:    #9B7555;
      --inner-bg:     #FAF0E0;
      --inner-border: #D4B08A;
      --hint-bg:      #F0E8FA;
      --hint-border:  #C4A0E0;
      --hint-text:    #5A3880;
      --good-bg:      #EEF7EE;
      --good-border:  #7BBF7A;
      --good-text:    #245424;
      --ok-bg:        #FFF9EC;
      --ok-border:    #D4A840;
      --ok-text:      #6A4C10;
      --stuck-bg:     #FDF0EE;
      --stuck-border: #D48870;
      --stuck-text:   #6A2C1A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      font-family: 'Sarabun', sans-serif;
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    #app {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      background: var(--cream);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── Progress ── */
    .progress-bar {
      position: sticky;
      top: 0;
      z-index: 10;
      height: 3px;
      background: var(--cream-dark);
    }
    .progress-fill {
      height: 100%;
      background: var(--tan);
      transition: width 0.6s ease;
    }

    /* ── Header ── */
    .game-header {
      padding: 20px 20px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .game-logo {
      width: 36px;
      height: 36px;
      background: var(--cream-mid);
      border: 1.5px solid var(--cream-dark);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .game-title-small {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-soft);
      line-height: 1.4;
    }

    /* ── Scene wrapper ── */
    .scene {
      display: flex;
      flex-direction: column;
      padding-bottom: 48px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Image ── */
    .scene-image-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      background: var(--cream-mid);
      overflow: hidden;
    }
    .scene-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .scene-image-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-soft);
      font-size: 14px;
    }

    /* ── Content ── */
    .scene-content {
      padding: 22px 20px 0;
    }

    /* Badge */
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--brown);
      background: var(--cream-mid);
      border: 1px solid var(--cream-dark);
      border-radius: 20px;
      padding: 3px 11px;
      margin-bottom: 10px;
    }

    /* Title */
    .scene-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.45;
      margin-bottom: 14px;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--cream-dark);
      margin-bottom: 16px;
    }

    /* Story text */
    .scene-text {
      font-size: 15px;
      font-weight: 400;
      line-height: 2;
      color: var(--text-mid);
      margin-bottom: 16px;
    }

    /* Inner voice */
    .inner-voice {
      position: relative;
      background: var(--inner-bg);
      border-left: 3px solid var(--inner-border);
      border-radius: 0 10px 10px 0;
      padding: 12px 14px 12px 16px;
      margin-bottom: 14px;
    }
    .inner-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--brown-light);
      margin-bottom: 5px;
    }
    .inner-text {
      font-size: 14px;
      font-style: italic;
      color: var(--text-mid);
      line-height: 1.75;
    }

    /* Hint */
    .hint-box {
      background: var(--hint-bg);
      border: 1px solid var(--hint-border);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 16px;
    }
    .hint-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--hint-text);
      margin-bottom: 5px;
      opacity: 0.75;
    }
    .hint-text {
      font-size: 13.5px;
      color: var(--hint-text);
      line-height: 1.75;
    }

    /* Choices */
    .choices-section {
      margin-top: 20px;
    }
    .choices-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-soft);
      margin-bottom: 10px;
    }
    .choices {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .choice-btn {
      background: white;
      border: 1.5px solid var(--cream-dark);
      border-radius: 12px;
      padding: 14px 16px;
      text-align: left;
      font-family: 'Sarabun', sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: var(--text-dark);
      cursor: pointer;
      line-height: 1.65;
      transition: background 0.18s, border-color 0.18s, transform 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:not(:disabled):hover {
      background: var(--cream-mid);
      border-color: var(--tan);
      transform: translateY(-1px);
    }
    .choice-btn:not(:disabled):active {
      transform: translateY(0);
    }
    .choice-btn:disabled {
      cursor: default;
      opacity: 0.55;
    }

    .choice-btn.picked-good  { background: var(--good-bg);  border-color: var(--good-border);  color: var(--good-text);  opacity: 1 !important; }
    .choice-btn.picked-ok    { background: var(--ok-bg);    border-color: var(--ok-border);    color: var(--ok-text);    opacity: 1 !important; }
    .choice-btn.picked-stuck { background: var(--stuck-bg); border-color: var(--stuck-border); color: var(--stuck-text); opacity: 1 !important; }

    /* Outcome */
    .outcome {
      display: none;
      margin-top: 18px;
      padding: 16px;
      background: white;
      border: 1px solid var(--cream-dark);
      border-radius: 12px;
      animation: fadeUp 0.35s ease both;
    }
    .outcome.visible { display: block; }

    .outcome-arrow {
      font-size: 12px;
      color: var(--text-soft);
      margin-bottom: 7px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .outcome-text {
      font-size: 15px;
      color: var(--text-mid);
      line-height: 1.85;
      margin-bottom: 12px;
    }
    .outcome-tag {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 11px;
      border-radius: 20px;
      line-height: 1.5;
    }
    .tag-good  { background: var(--good-bg);  color: var(--good-text);  border: 1px solid var(--good-border); }
    .tag-ok    { background: var(--ok-bg);    color: var(--ok-text);    border: 1px solid var(--ok-border); }
    .tag-stuck { background: var(--stuck-bg); color: var(--stuck-text); border: 1px solid var(--stuck-border); }

    /* Next button */
    .next-btn {
      display: none;
      width: 100%;
      margin-top: 14px;
      padding: 15px 20px;
      background: var(--brown-light);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Sarabun', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, transform 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .next-btn:hover { background: var(--brown); transform: translateY(-1px); }
    .next-btn:active { transform: translateY(0); }
    .next-btn.visible { display: block; animation: fadeUp 0.3s ease both; }

    /* End screen */
    .end-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 60px 28px 48px;
      animation: fadeUp 0.6s ease both;
    }
    .end-ornament {
      font-size: 42px;
      margin-bottom: 22px;
      line-height: 1;
    }
    .end-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--brown);
      background: var(--cream-mid);
      border: 1px solid var(--cream-dark);
      border-radius: 20px;
      padding: 3px 14px;
      margin-bottom: 14px;
    }
    .end-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 14px;
      line-height: 1.4;
    }
    .end-text {
      font-size: 15px;
      color: var(--text-mid);
      line-height: 2;
      max-width: 320px;
    }
    .end-restart {
      margin-top: 32px;
      padding: 13px 32px;
      background: transparent;
      color: var(--brown-light);
      border: 1.5px solid var(--tan);
      border-radius: 12px;
      font-family: 'Sarabun', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
    }
    .end-restart:hover {
      background: var(--cream-mid);
      border-color: var(--brown-light);
    }

    /* Ending card */
    .ending-card {
      width: 100%;
      max-width: 360px;
      background: white;
      border: 1px solid var(--cream-dark);
      border-radius: 16px;
      padding: 22px 20px;
      margin-top: 28px;
      text-align: left;
    }
    .ending-card-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--brown);
      margin-bottom: 14px;
    }
    .ending-insight-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .ending-insight-list li {
      font-size: 14.5px;
      color: var(--text-mid);
      line-height: 1.75;
      padding-left: 14px;
      position: relative;
    }
    .ending-insight-list li::before {
      content: '·';
      position: absolute;
      left: 0;
      color: var(--tan);
      font-weight: 700;
    }
    .ending-divider {
      height: 1px;
      background: var(--cream-dark);
      margin: 16px 0;
    }
    .ending-question {
      font-size: 14px;
      font-style: italic;
      color: var(--text-dark);
      line-height: 1.85;
    }

    /* Inner voice multi-line (B3) */
    .inner-line {
      font-size: 14px;
      font-style: italic;
      color: var(--text-mid);
      line-height: 1.75;
    }
    .inner-line + .inner-line {
      margin-top: 5px;
      padding-top: 5px;
      border-top: 1px dashed var(--inner-border);
    }

    /* Mirror / free-text prompt */
    .free-prompt-section {
      background: var(--inner-bg);
      border: 1px solid var(--inner-border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-top: 16px;
    }
    .free-prompt-text {
      font-size: 14px;
      color: var(--text-mid);
      line-height: 1.8;
      margin-bottom: 10px;
    }
    .free-prompt-input {
      width: 100%;
      border: 1.5px solid var(--cream-dark);
      border-radius: 8px;
      padding: 10px 12px;
      font-family: 'Sarabun', sans-serif;
      font-size: 14px;
      color: var(--text-dark);
      background: white;
      resize: none;
      line-height: 1.7;
      margin-bottom: 8px;
    }
    .free-prompt-input:focus { outline: none; border-color: var(--tan); }
    .free-prompt-submit {
      background: var(--brown-light);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-family: 'Sarabun', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .free-prompt-submit:disabled { opacity: 0.5; cursor: default; }
    .mirror-response {
      margin-top: 10px;
      font-size: 14px;
      color: var(--hint-text);
      background: var(--hint-bg);
      border: 1px solid var(--hint-border);
      border-radius: 8px;
      padding: 10px 14px;
      line-height: 1.7;
    }

    /* Insight box (B3) */
    .insight-box {
      background: var(--hint-bg);
      border: 1px solid var(--hint-border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    .insight-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--hint-text);
      margin-bottom: 8px;
    }
    .insight-body {
      font-size: 14px;
      color: var(--hint-text);
      line-height: 1.8;
      margin-bottom: 8px;
    }
    .insight-note {
      font-size: 13px;
      font-style: italic;
      color: var(--hint-text);
      opacity: 0.8;
      line-height: 1.7;
      padding-top: 8px;
      border-top: 1px solid var(--hint-border);
    }

    /* Chooser note box (B4) */
    .chooser-box {
      background: var(--cream-mid);
      border: 1px solid var(--cream-dark);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 16px;
    }
    .chooser-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--brown);
      margin-bottom: 5px;
    }
    .chooser-text {
      font-size: 13.5px;
      color: var(--text-mid);
      line-height: 1.75;
      font-style: italic;
    }

    /* Joyful choice type (B4 C) */
    .choice-btn.picked-joyful { background: #FFF0F6; border-color: #D4789A; color: #7A2045; opacity: 1 !important; }
    .tag-joyful { background: #FFF0F6; color: #7A2045; border: 1px solid #D4789A; }

    /* Summary screen */
    .summary-screen {
      padding: 28px 20px 48px;
      animation: fadeUp 0.6s ease both;
    }
    .summary-closing {
      text-align: center;
      padding: 20px 0 24px;
      border-bottom: 1px solid var(--cream-dark);
      margin-bottom: 24px;
    }
    .summary-closing-ornament {
      font-size: 32px;
      margin-bottom: 12px;
    }
    .summary-closing-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--brown);
      margin-bottom: 8px;
    }
    .summary-closing-text {
      font-size: 14.5px;
      color: var(--text-mid);
      line-height: 2;
    }
    .summary-section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-soft);
      margin-bottom: 12px;
    }
    .summary-choices {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }
    .summary-choice-row {
      background: white;
      border: 1px solid var(--cream-dark);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .summary-scene-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--brown);
      background: var(--cream-mid);
      border: 1px solid var(--cream-dark);
      border-radius: 20px;
      padding: 2px 8px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .summary-choice-detail { flex: 1; min-width: 0; }
    .summary-choice-text {
      font-size: 13.5px;
      color: var(--text-mid);
      line-height: 1.65;
      margin-bottom: 6px;
    }
    .summary-type-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 20px;
      line-height: 1.5;
    }
    .summary-reflection {
      background: var(--inner-bg);
      border-left: 3px solid var(--inner-border);
      border-radius: 0 10px 10px 0;
      padding: 14px 16px;
      margin-bottom: 20px;
    }
    .summary-reflection-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--brown-light);
      margin-bottom: 8px;
    }
    .summary-reflection-text {
      font-size: 14px;
      color: var(--text-mid);
      line-height: 1.9;
    }
    .summary-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 24px;
    }
    .summary-btn-primary {
      width: 100%;
      padding: 15px 20px;
      background: var(--brown-light);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Sarabun', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, transform 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .summary-btn-primary:hover { background: var(--brown); transform: translateY(-1px); }
    .summary-btn-primary:active { transform: translateY(0); }
    .summary-btn-secondary {
      width: 100%;
      padding: 13px 20px;
      background: transparent;
      color: var(--text-soft);
      border: 1.5px solid var(--cream-dark);
      border-radius: 12px;
      font-family: 'Sarabun', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      -webkit-tap-highlight-color: transparent;
    }
    .summary-btn-secondary:hover { background: var(--cream-mid); border-color: var(--tan); }

    /* Feedback widget */
    .feedback-widget {
      background: white;
      border: 1px solid var(--cream-dark);
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
      transition: opacity 1.5s ease;
    }
    .feedback-widget-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--brown);
      margin-bottom: 16px;
    }
    .feedback-q {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 10px;
      line-height: 1.5;
    }
    .feedback-emoji-row {
      display: flex;
      gap: 6px;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .fb-emoji-btn {
      flex: 1;
      font-size: 22px;
      background: var(--cream);
      border: 2px solid var(--cream-dark);
      border-radius: 12px;
      padding: 9px 2px;
      cursor: pointer;
      line-height: 1;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .fb-emoji-btn:hover  { border-color: var(--tan); background: var(--cream-mid); }
    .fb-emoji-btn.selected { border-color: var(--brown-light); background: var(--inner-bg); }
    .fb-textarea {
      width: 100%;
      border: 1.5px solid var(--cream-dark);
      border-radius: 10px;
      padding: 11px 12px;
      font-family: 'Sarabun', sans-serif;
      font-size: 14px;
      color: var(--text-dark);
      background: var(--cream);
      resize: none;
      outline: none;
      line-height: 1.7;
      min-height: 76px;
      transition: border-color 0.15s;
      display: block;
    }
    .fb-textarea:focus { border-color: var(--tan); }
    .fb-char-count {
      font-size: 11px;
      color: var(--text-soft);
      text-align: right;
      margin-top: 4px;
      margin-bottom: 18px;
    }
    .fb-pair-btns {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }
    .fb-pair-btn {
      flex: 1;
      background: var(--cream);
      border: 1.5px solid var(--cream-dark);
      border-radius: 10px;
      padding: 11px 6px;
      font-family: 'Sarabun', sans-serif;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text-mid);
      cursor: pointer;
      line-height: 1.4;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .fb-pair-btn:hover   { border-color: var(--tan); background: var(--cream-mid); }
    .fb-pair-btn.selected { border-color: var(--brown-light); background: var(--inner-bg); color: var(--text-dark); }
    .fb-submit {
      width: 100%;
      padding: 14px;
      background: var(--brown-light);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Sarabun', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, transform 0.12s;
      -webkit-tap-highlight-color: transparent;
      margin-top: 2px;
    }
    .fb-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .fb-submit:not(:disabled):hover { background: var(--brown); transform: translateY(-1px); }
    .feedback-thankyou {
      text-align: center;
      font-size: 16px;

function preloadTrackImages(trackId) {
  const t = tracks[trackId];
  if (!t) return;
  t.scenes.forEach(s => {
    if (s.image) {
      const img = new Image();
      img.src = s.image;
    }
  });
}

function selectTrack(trackId) {
  preloadTrackImages(trackId);
  startGame(trackId);
}

function startGame(trackId) {
  currentTrack = trackId || 1;
  currentScenes = tracks[currentTrack].scenes;
  currentScene = 0;
  playerChoices = [];
  feedbackState = { rating: null, freeText: '', recommend: null, returnIntent: null };
  showOnboarding(currentTrack);
}

function renderScene(index) {
  const s = currentScenes[index];
  updateProgress();

  // Inner voice: string or array of lines
  const innerBodyHTML = Array.isArray(s.innerVoice)
    ? s.innerVoice.map((line, i) =>
        `<div class="inner-line" style="padding-left:${i * 8}px">${line}</div>`
      ).join('')
    : `<div class="inner-text">${s.innerVoice}</div>`;

  const hintHTML = s.hint
    ? `<div class="hint-box">
         <div class="hint-label">สังเกต</div>
         <div class="hint-text">${s.hint}</div>
       </div>`
    : '';

  const insightHTML = s.insight
    ? `<div class="insight-box">
         <div class="insight-title">&#x2736; ${s.insight.title}</div>
         <div class="insight-body">${s.insight.body}</div>
         <div class="insight-note">${s.insight.note}</div>
       </div>`
    : '';

  const chooserHTML = s.chooserNote
    ? `<div class="chooser-box">
         <div class="chooser-label">ผู้เลือก</div>
         <div class="chooser-text">${s.chooserNote}</div>
       </div>`
    : '';

  const choicesHTML = s.choices.map((c, i) =>
    `<button class="choice-btn" data-index="${i}" onclick="selectChoice(${i})">${c.text}</button>`
  ).join('');

  const freePromptHTML = s.freePrompt ? `
    <div class="free-prompt-section">
      <div class="free-prompt-text">${s.freePrompt.prompt}</div>
      <textarea id="mirror-input-${s.id}" class="free-prompt-input"
        placeholder="${s.freePrompt.placeholder}" rows="3" maxlength="300"></textarea>
      <button id="mirror-submit-${s.id}" class="free-prompt-submit"
        onclick="submitMirrorText('${s.id}')">ส่งให้มินนา</button>
      <div id="mirror-response-${s.id}" class="mirror-response" style="display:none;"></div>
    </div>` : '';

  const html = `
    <div class="game-header">
      <div class="game-logo">&#x1F43E;</div>
      <div class="game-title-small">Minna Journey<br>มินนา เส้นทางของใจ</div>
    </div>
    <div class="scene">
      <div class="scene-image-wrap" style="margin-top:16px;">
        <img class="scene-image" src="${s.image}" alt="${s.title}"
             onerror="this.parentNode.innerHTML='<div class=\\'scene-image-placeholder\\'>[ ${s.title} ]</div>'">
      </div>
      <div class="scene-content">
        <span class="badge">${s.badge}</span>
        <h1 class="scene-title">${s.title}</h1>
        <div class="divider"></div>
        <p class="scene-text">${s.text}</p>
        <div class="inner-voice">
          <div class="inner-label">เสียงในใจ</div>
          ${innerBodyHTML}
        </div>
        ${hintHTML}
        ${insightHTML}
        ${chooserHTML}
        <div class="choices-section">
          <div class="choices-label">เลือกสักทาง</div>
          <div class="choices">${choicesHTML}</div>
        </div>
        ${freePromptHTML}
        <div class="outcome" id="outcome">
          <div class="outcome-arrow">&#x25B6; ผลที่ตามมา</div>
          <div class="outcome-text" id="outcome-text"></div>
          <span class="outcome-tag" id="outcome-tag"></span>
        </div>
        <button class="next-btn" id="next-btn" onclick="nextScene()">
          ${index < currentScenes.length - 1 ? 'ไปต่อ ›' : 'จบบทนี้'}
        </button>
      </div>
    </div>
  `;

  document.getElementById('scene-container').innerHTML = html;
  window.scrollTo({ top: 0 });
}

function selectChoice(index) {
  const s = currentScenes[currentScene];
  const choice = s.choices[index];

  playerChoices.push({
    sceneId: s.id,
    choiceText: choice.text,
    type: choice.type,
    tag: choice.tag
  });

  document.querySelectorAll('.choice-btn').forEach((btn, i) => {
    btn.disabled = true;
    if (i === index) {
      btn.classList.add('picked-' + choice.type);
    }
  });

  const outcomeEl   = document.getElementById('outcome');
  const outcomeText = document.getElementById('outcome-text');
  const outcomeTag  = document.getElementById('outcome-tag');
  const nextBtn     = document.getElementById('next-btn');

  outcomeText.textContent = choice.outcome;
  outcomeTag.textContent  = choice.tag;
  outcomeTag.className    = 'outcome-tag tag-' + choice.type;
  outcomeEl.classList.add('visible');
  nextBtn.classList.add('visible');

  setTimeout(() => {
    outcomeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 80);
}

function nextScene() {
  currentScene++;
  if (currentScene < currentScenes.length) {
    renderScene(currentScene);
  } else {
    showSummary();
  }
}

      return { title: 'ครอบครัวกำลังเรียนรู้ภาษาของกันและกัน', text: 'บางก้าวเล็ก บางก้าวใหญ่ แต่ทุกครั้งที่กลับมานั่งด้วยกันได้ ก็ถือว่าก้าวหน้าแล้ว' };
    } else {
      return { title: 'บางวันบ้านก็ต้องการเวลาเหมือนกัน', text: 'ความรู้สึกอึดอัดในบ้านเป็นเรื่องจริง และพูดได้ — การที่ยังอยู่ด้วยกันได้คือสิ่งสำคัญที่สุด' };
    }
  }

  if (currentTrack === 4) {
    if (stuck === 0) {
      return { title: 'โมเน่รับรู้ความรู้สึกของตัวเองได้อย่างชัดเจน', text: 'การยืนหยัดในสิ่งที่ตัวเองชอบโดยไม่ต้องแก้ตัวให้ใคร ต้องอาศัยความกล้าที่หลายคนยังหาไม่เจอ' };
    } else if (stuck >= 2) {
      return { title: 'เสียงข้างในของโมเน่ยังต้องใช้เวลา', text: 'การปกป้องตัวเองด้วยการเงียบหรือยิ้มเป็นเรื่องธรรมชาติ ไม่มีอะไรผิด — แค่รู้ว่ามีอีกเสียงหนึ่งอยู่ข้างในก็เป็นจุดเริ่มต้นแล้ว' };
    } else {
      return { title: 'โมเน่กำลังเรียนรู้ว่าสิ่งที่ชอบไม่ต้องซ่อนไว้', text: 'บางก้าวเล็ก บางก้าวใหญ่ แต่ทุกครั้งที่โมเน่รับรู้ว่าตัวเองรู้สึกอะไร ก็ถือว่าก้าวหน้าแล้ว' };
    }
  }

  if (currentTrack === 3) {
    if (stuck === 0) {
      return { title: 'มินนารับรู้ความรู้สึกของตัวเองได้ดีมาก', text: 'การหยุดสังเกตสิ่งที่ค้างอยู่ในใจ แทนที่จะผลักมันออกไป คือสิ่งที่ต้องอาศัยความกล้ามากกว่าที่คิด' };
    } else {
      return { title: 'ความรู้สึกที่อึดอัดก็มีที่มาเสมอ', text: 'ไม่ต้องรีบเข้าใจทุกอย่างในทีเดียว แค่รู้ว่ามันอยู่ที่นั่น ก็ถือว่าเริ่มต้นแล้ว' };
    }
  }

  if (currentTrack === 2) {
    if (choices.length === 4 && choices[3].type === 'joyful') {
      return {
        title: 'มินนาเปิดใจอย่างเต็มที่ &#127800;',
        text:  'การยิ้มกว้างๆ แบบนั้นต้องอาศัยความกล้าพอสมควรนะ มินนาทำให้ใบบัวรู้สึกว่าตัวเองก็มีคนอยากนั่งด้วยเช่นกัน'
      };
    }
    if (stuck === 0) {
      return {
        title: 'มินนาก้าวผ่านความกลัวได้อย่างงดงาม',
        text:  'ตลอดเรื่องมินนาเลือกที่จะเผชิญแทนที่จะหนี นั่นไม่ใช่เรื่องเล็กน้อย การเริ่มต้นมิตรภาพใหม่ต้องอาศัยความกล้าที่หลายคนไม่ยอมใช้'
      };
    } else if (stuck >= 3) {
      return {
        title: 'วันนี้ความกลัวดังกว่าเสียงอื่น และมันก็โอเคนะ',
        text:  'ความกลัวการถูกปฏิเสธเป็นเรื่องปกติมาก มินนาไม่ได้อ่อนแอ แค่กำลังเรียนรู้ว่าจะอยู่กับความรู้สึกนั้นอย่างไร วันไหนพร้อม ก้าวนั้นก็จะมาเอง'
      };
    } else if (goodish >= 2) {
      return {
        title: 'มินนาเลือกที่จะกล้า แม้จะไม่แน่ใจ',
        text:  'ไม่มีใครมั่นใจ 100% ก่อนเริ่มมิตรภาพใหม่ แต่มินนาเลือกเดินหน้า สิ่งสำคัญไม่ใช่ผลลัพธ์ แต่คือการที่มินนาเชื่อใจตัวเองพอที่จะลอง'
      };
    } else {
      return {
        title: 'มินนากำลังเรียนรู้ว่าการเชื่อมใจต้องอาศัยความกล้า',
        text:  'บางก้าวรู้สึกหนัก บางก้าวรู้สึกง่าย ทุกครั้งที่มินนาสังเกตเห็นความรู้สึกของตัวเองก็นับว่าก้าวหน้าแล้ว'
      };
    }
  }

  // Track 1
  if (choices.length === 4 && choices[3].type === 'joyful') {
    return {
      title: 'การได้กอดมะม่วงทำให้ใจมินนาอุ่นขึ้นจริงๆ &#129505;',
      text:  'แต่ตีสองที่ต้องลุกมาทำการบ้าน... มินนารู้สึกยังไงกับตัวเองตอนนั้นนะ?'
    };
  }
  if (stuck === 0) {
    return {
      title: 'มินนาเดินทางได้อย่างนุ่มนวลมาก',
      text:  'ตลอดวันนี้มินนารับรู้ความรู้สึกของตัวเองและดูแลความสัมพันธ์ไปพร้อมกัน สิ่งที่มินนาทำอาจดูเล็กน้อย แต่มันสะท้อนความใส่ใจที่ลึกมาก'
    };
  } else if (stuck >= 3) {
    return {
      title: 'วันนี้หนักหน่อย และมันก็โอเคนะ',
      text:  'บางวันเราก็ติดอยู่กับความรู้สึกนานกว่าปกติ ไม่ได้แปลว่าเราผิดพลาด แค่แปลว่าเราเป็นคนธรรมดาที่ยังเรียนรู้อยู่ เหมือนมะม่วงที่บางทีก็ต้องการพื้นที่ เราก็ต้องการแบบนั้นบ้าง'
    };
  } else if (goodish >= 2) {
    return {
      title: 'มินนาสังเกตและเลือกได้ดีมาก',
      text:  'มินนาไม่ได้ทำทุกอย่างได้สมบูรณ์แบบ แต่สังเกตเห็นความรู้สึกและเลือกทางออกที่ดูแลทั้งตัวเองและความสัมพันธ์ได้ นั่นคือสิ่งที่สำคัญที่สุด'
    };
  } else {
    return {
      title: 'มินนากำลังเรียนรู้อยู่',
      text:  'ทุกครั้งที่เราสังเกตเห็นว่าตัวเองทำอะไรไป ก็ถือว่าก้าวหน้าแล้ว ไม่มีทางเลือกไหนผิดหรือถูกตลอดไป มีแค่ทางที่เราเรียนรู้จากมัน'
    };
  }
}

function showSummary() {
  document.getElementById('progress-fill').style.width = '100%';
  const reflection = getReflection(playerChoices);
  const { closingTitle, closingText, insights, question } = tracks[currentTrack].summary;

  const choicesHTML = playerChoices.map(c => `
    <div class="summary-choice-row">
      <span class="summary-scene-badge">${c.sceneId}</span>
      <div class="summary-choice-detail">
        <div class="summary-choice-text">${c.choiceText}</div>
        <span class="summary-type-badge tag-${c.type}">${(c.type === 'good' || c.type === 'joyful') ? c.tag : (typeLabels[c.type] || c.type)}</span>
      </div>
    </div>
  `).join('');

  document.getElementById('scene-container').innerHTML = `
    <div class="game-header">
      <div class="game-logo">&#x1F43E;</div>
      <div class="game-title-small">Minna Journey<br>มินนา เส้นทางของใจ</div>
    </div>
    <div class="summary-screen">
      <div class="summary-closing">
        <div class="summary-closing-ornament">&#x2736;</div>
        <div class="summary-closing-title">${closingTitle}</div>
        <p class="summary-closing-text">${closingText}</p>
      </div>

      <div class="summary-section-label">สิ่งที่มินนาเลือกวันนี้</div>
      <div class="summary-choices">${choicesHTML}</div>

      <div class="summary-reflection">
        <div class="summary-reflection-title">${reflection.title}</div>
        <div class="summary-reflection-text">${reflection.text}</div>
      </div>

      <div class="ending-card">
        <div class="ending-card-title">วันนี้${tracks[currentTrack].protagonist}เรียนรู้ว่า...</div>
        <ul class="ending-insight-list">
          ${insights.map(i => `<li>${i}</li>`).join('')}
        </ul>
        <div class="ending-divider"></div>
        <p class="ending-question">${question}</p>
      </div>

      <div id="feedback-widget" class="feedback-widget">
        <div class="feedback-widget-title">บอกความรู้สึกให้หน่อยนะ</div>

        <div class="feedback-q">วันนี้รู้สึกยังไงบ้าง?</div>
        <div class="feedback-emoji-row">
          <button class="fb-emoji-btn" onclick="selectEmoji(1)">&#128532;</button>
          <button class="fb-emoji-btn" onclick="selectEmoji(2)">&#128528;</button>
          <button class="fb-emoji-btn" onclick="selectEmoji(3)">&#128578;</button>
          <button class="fb-emoji-btn" onclick="selectEmoji(4)">&#128522;</button>
          <button class="fb-emoji-btn" onclick="selectEmoji(5)">&#128516;</button>
        </div>

        <div class="feedback-q">อยากบอกอะไรกับมินนาไหม?</div>
        <textarea class="fb-textarea" id="fb-text" placeholder="พิมพ์ได้เลยนะ..." maxlength="200" rows="3" oninput="updateFbText(this)"></textarea>
        <div class="fb-char-count" id="fb-char-count">0 / 200</div>

        <div class="feedback-q">อยากชวนเพื่อนมาเล่นด้วยไหม?</div>
        <div class="fb-pair-btns">
          <button class="fb-pair-btn" id="fb-rec-yes" onclick="selectPair('recommend','yes')">อยากเลย &#128155;</button>
          <button class="fb-pair-btn" id="fb-rec-no"  onclick="selectPair('recommend','uncertain')">ยังไม่แน่ใจ</button>
        </div>

        <div class="feedback-q">อยากกลับมาเล่นเรื่องอื่นอีกไหม?</div>
        <div class="fb-pair-btns">
          <button class="fb-pair-btn" id="fb-ret-yes" onclick="selectPair('returnIntent','yes')">อยากมาก &#127775;</button>
          <button class="fb-pair-btn" id="fb-ret-no"  onclick="selectPair('returnIntent','uncertain')">ขอดูก่อน</button>
        </div>

        <button class="fb-submit" id="fb-submit" onclick="submitFeedback()" disabled>ส่งความรู้สึก</button>
      </div>

      <div class="summary-buttons">
        <button class="summary-btn-primary" onclick="showReplayPanel()">เลือกใหม่อีกครั้ง</button>
        <button class="summary-btn-secondary" onclick="showHome()">กลับหน้าหลัก</button>
      </div>
    </div>
  `;
  window.scrollTo({ top: 0 });
}

function selectEmoji(n) {
  feedbackState.rating = n;
  document.querySelectorAll('.fb-emoji-btn').forEach((btn, i) => {
    btn.classList.toggle('selected', i + 1 === n);
  });
  updateSubmitBtn();
}

function selectPair(field, val) {
  feedbackState[field] = val;
  const prefix = field === 'recommend' ? 'fb-rec' : 'fb-ret';
  document.getElementById(prefix + '-yes').classList.toggle('selected', val === 'yes');
  document.getElementById(prefix + '-no').classList.toggle('selected',  val === 'uncertain');
  updateSubmitBtn();
}

function updateFbText(el) {
  feedbackState.freeText = el.value;
  const count = document.getElementById('fb-char-count');
  if (count) count.textContent = el.value.length + ' / 200';
}

function updateSubmitBtn() {
  const btn = document.getElementById('fb-submit');
  if (!btn) return;
  btn.disabled = !(feedbackState.rating !== null &&
                   feedbackState.recommend !== null &&
                   feedbackState.returnIntent !== null);
}

function submitFeedback() {
  const payload = {
    timestamp:     new Date().toISOString(),
    track:         currentTrack,
    choicePattern: playerChoices,
    rating:        feedbackState.rating,
    freeText:      feedbackState.freeText || '',
    recommend:     feedbackState.recommend,
    returnIntent:  feedbackState.returnIntent
  };
  if (APPS_SCRIPT_URL) {
    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).catch(() => {});
  }
  const widget = document.getElementById('feedback-widget');
  if (!widget) return;
  widget.innerHTML = '<div class="feedback-thankyou">ขอบคุณนะ &#127800; มินนาจะจำไว้เสมอ</div>';
  setTimeout(() => { widget.style.opacity = '0'; }, 1800);
  setTimeout(() => { widget.style.display = 'none'; }, 3300);
}

function showReplayPanel() {
  document.getElementById('scene-container').innerHTML = `
    <div class="game-header">
      <div class="game-logo">&#x1F43E;</div>
      <div class="game-title-small">Minna Journey<br>มินนา เส้นทางของใจ</div>
    </div>
    <div class="replay-panel">
      <div class="replay-panel-title">เลือกใหม่</div>
      <p class="replay-panel-sub">อยากย้อนกลับไปตรงไหน?<br>การเลือกก่อนหน้าจะถูกเก็บไว้ให้</p>
      <div class="replay-grid">
        ${currentScenes.map((s, i) => `<button class="replay-scene-btn" onclick="replayFrom(${i})">ย้อนกลับ ${s.id.toUpperCase()} · ${s.title}</button>`).join('')}
      </div>
    </div>
  `;
  window.scrollTo({ top: 0 });
}

const mirrorResponses = [
  'ขอบคุณที่บอกมินนานะ &#127807;',
  'มินนารับฟังทุกคำที่เธอบอกเลย',
  'ความรู้สึกของเธอสำคัญมาก — ขอบคุณนะ',
  'แค่สังเกตเห็นแบบนี้ก็กล้ามากแล้ว',
  'มินนาเก็บสิ่งที่เธอบอกไว้ในใจเลย &#127800;',
  'ขอบคุณที่ไว้ใจบอกกับเรา — นี่คือเสียงของเธอจริงๆ'
];

function submitMirrorText(sceneId) {
  const textarea = document.getElementById('mirror-input-' + sceneId);
  const submitBtn = document.getElementById('mirror-submit-' + sceneId);
  const responseEl = document.getElementById('mirror-response-' + sceneId);
  if (!textarea.value.trim()) return;
  textarea.disabled = true;
  submitBtn.disabled = true;
  responseEl.textContent = mirrorResponses[Math.floor(Math.random() * mirrorResponses.length)];
  responseEl.style.display = 'block';
}

function replayFrom(sceneIndex) {
  playerChoices = playerChoices.slice(0, sceneIndex);
  feedbackState = { rating: null, freeText: '', recommend: null, returnIntent: null };
  currentScene = sceneIndex;
  renderScene(sceneIndex);
}

function replayTrack() {
  currentScene = 0;
  playerChoices = [];
  feedbackState = { rating: null, freeText: '', recommend: null, returnIntent: null };
  renderScene(0);
}

function showEnd() {
  const endContent = currentTrack === 2 ? {
    badge: 'จบบทที่ 2',
    title: 'จบบทที่ 2',
    text: 'ใบบัวไม่ได้รอเพื่อนที่สมบูรณ์แบบ — เธอแค่รอคนที่กล้าเดินเข้ามา<br><br>และมินนาก็เป็นคนนั้น',
    insights: ['ความกลัวการปฏิเสธเป็นเรื่องปกติมาก', 'ก้าวแรกไม่ต้องสมบูรณ์ แค่ต้องกล้า', 'มิตรภาพเริ่มจากการที่ใครสักคนตัดสินใจก่อน'],
    question: 'มีใครสักคนในชีวิตที่เราอยากรู้จักมากกว่านี้ แต่ยังไม่กล้าเริ่มบ้างไหม?'
  } : {
    badge: 'จบบทที่ 1',
    title: 'จบบทที่ 1',
    text: 'มะม่วงไม่ได้งอนมินนา — มันแค่รอให้มินนากลับมาจริงๆ<br><br>ความสัมพันธ์เล็กๆ ก็สอนเราเรื่องใหญ่ๆ ได้เสมอ',
    insights: ['ความรู้สึกเล็กๆ มีความหมายเสมอ', 'การสังเกตคือของขวัญที่ให้ได้ทุกวัน', 'บางทีแค่เติมน้ำในชาม ก็คือการบอกรัก'],
    question: 'วันนี้มีใครรอบข้างที่อาจกำลังรอบางอย่างจากเราอยู่บ้างไหม?'
  };
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('scene-container').innerHTML = `
    <div class="game-header">
      <div class="game-logo">&#x1F43E;</div>
      <div class="game-title-small">Minna Journey<br>มินนา เส้นทางของใจ</div>
    </div>
    <div class="end-screen">
      <div class="end-ornament">&#x2736;</div>
      <span class="end-badge">${endContent.badge}</span>
      <h2 class="end-title">${endContent.title}</h2>
      <p class="end-text">${endContent.text}</p>
      <div class="ending-card">
        <div class="ending-card-title">วันนี้${tracks[currentTrack].protagonist}เรียนรู้ว่า...</div>
        <ul class="ending-insight-list">
          ${endContent.insights.map(i => `<li>${i}</li>`).join('')}
        </ul>
        <div class="ending-divider"></div>
        <p class="ending-question">${endContent.question}</p>
      </div>
      <button class="end-restart" onclick="restart()">เริ่มใหม่อีกครั้ง</button>
      <button class="end-restart" onclick="showHome()" style="margin-top:10px; border-color:var(--cream-dark); color:var(--text-soft);">กลับไปเลือกเรื่องอื่น</button>
    </div>
  `;
}

function restart() {
  currentScene = 0;
  playerChoices = [];
  feedbackState = { rating: null, freeText: '', recommend: null, returnIntent: null };
  renderScene(0);
}

showHome();
</script>
</body>
</html>
